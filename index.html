<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>NaldoA Play</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{
--primary:#d4af37;
--bg:#090b14;
--card:#131926;
--text:#fff;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#2b2147 0%,#090b14 60%);
z-index:-2;
}

.header{
position:sticky;
top:0;
z-index:100;
padding:18px;
background:rgba(9,11,20,.9);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:52px;
height:52px;
border-radius:16px;
object-fit:cover;
border:2px solid rgba(255,255,255,.1);
}

.logo h1{
font-size:1.1rem;
font-weight:800;
}

.live{
padding:8px 14px;
border-radius:40px;
background:rgba(212,175,55,.12);
display:flex;
align-items:center;
gap:8px;
color:var(--primary);
font-weight:700;
font-size:.75rem;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:var(--primary);
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
opacity:.3;
transform:scale(.6);
}
}

.container{
padding:18px;
padding-bottom:120px;
max-width:700px;
margin:auto;
}

.player{
background:linear-gradient(180deg,#171c2b,#10131c);
border-radius:34px;
padding:28px 22px;
border:1px solid rgba(255,255,255,.06);
box-shadow:0 10px 50px rgba(0,0,0,.4);
}

.disc-wrap{
width:250px;
height:250px;
margin:auto;
position:relative;
}

.disc-ring{
position:absolute;
inset:-10px;
border-radius:50%;
border:3px solid rgba(255,255,255,.1);
animation:spin 6s linear infinite;
}

.loading .disc-ring{
border-top-color:var(--primary);
border-right-color:#fff;
}

.playing .disc-ring{
border-top-color:var(--primary);
border-right-color:#fff;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.disc{
width:100%;
height:100%;
border-radius:50%;
overflow:hidden;
border:5px solid rgba(255,255,255,.08);
box-shadow:0 0 40px rgba(212,175,55,.25);
}

.disc img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
text-align:center;
margin-top:24px;
}

.info h2{
font-size:1.4rem;
font-weight:800;
}

.info p{
margin-top:7px;
font-size:.9rem;
opacity:.7;
}

.visualizer{
display:flex;
justify-content:center;
align-items:flex-end;
gap:5px;
height:55px;
margin:24px 0;
}

.bar{
width:5px;
height:15px;
border-radius:30px;
background:linear-gradient(to top,var(--primary),#fff);
transition:.15s;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
}

.btn{
border:none;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
background:#1a2130;
color:#fff;
}

.btn svg{
fill:white;
width:24px;
height:24px;
}

.small{
width:58px;
height:58px;
}

.big{
width:84px;
height:84px;
background:linear-gradient(135deg,var(--primary),#ffdf7d);
box-shadow:0 0 35px rgba(212,175,55,.5);
}

.loader{
width:28px;
height:28px;
border-radius:50%;
border:3px solid rgba(255,255,255,.25);
border-top-color:#fff;
animation:spin 1s linear infinite;
display:none;
}

.volume{
width:100%;
margin-top:24px;
accent-color:var(--primary);
}

.title{
font-size:1rem;
font-weight:800;
margin:24px 0 14px;
color:var(--primary);
}

.search{
background:#141926;
border-radius:18px;
padding:14px;
margin-bottom:18px;
}

.search input{
width:100%;
background:none;
border:none;
outline:none;
color:#fff;
font-size:.95rem;
}

.list{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:#141926;
padding:14px;
border-radius:24px;
display:flex;
align-items:center;
gap:14px;
cursor:pointer;
border:1px solid rgba(255,255,255,.05);
transition:.2s;
}

.card:hover{
transform:translateY(-2px);
border-color:rgba(212,175,55,.4);
}

.card img{
width:65px;
height:65px;
border-radius:18px;
object-fit:cover;
background:#222;
}

.card h3{
font-size:.95rem;
font-weight:700;
}

.card span{
font-size:.75rem;
opacity:.6;
}

.tv-player{
background:#000;
border-radius:24px;
overflow:hidden;
margin-bottom:18px;
border:2px solid rgba(212,175,55,.3);
position:relative;
}

.tv-player video{
width:100%;
height:240px;
background:#000;
}

.fullscreen{
position:absolute;
bottom:12px;
right:12px;
width:48px;
height:48px;
border:none;
border-radius:50%;
background:rgba(0,0,0,.7);
color:#fff;
font-size:1.1rem;
cursor:pointer;
}

.section{
display:none;
}

.section.active{
display:block;
animation:fade .3s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:none;
}
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
padding:12px 14px 28px;
background:rgba(9,11,20,.92);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
border-top:1px solid rgba(255,255,255,.05);
}

.nav button{
background:none;
border:none;
color:#8d8d8d;
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:.72rem;
cursor:pointer;
}

.nav button.active{
color:var(--primary);
}

.nav svg{
width:22px;
height:22px;
stroke:currentColor;
fill:none;
}

.theme-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.theme{
height:100px;
border-radius:24px;
cursor:pointer;
}

</style>
</head>
<body>

<header class="header">

<div class="logo">
<img src="logo1.jpg">
<div>
<h1>NALDOA PLAY</h1>
<div style="font-size:.75rem;opacity:.6;">Rádio Premium</div>
</div>
</div>

<div class="live">
<div class="dot"></div>
AO VIVO
</div>

</header>

<div class="container">

<section class="section active" id="home">

<div class="player" id="player">

<div class="disc-wrap">

<div class="disc-ring"></div>

<div class="disc">
<img src="logo1.jpg" id="radioLogo">
</div>

</div>

<div class="info">
<h2 id="radioName">NALDOA PLAY</h2>
<p id="radioGenre">Premium Hits</p>
</div>

<div class="visualizer" id="visualizer">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<div class="controls">

<button class="btn small" id="prevBtn">

<svg viewBox="0 0 24 24">
<path d="M6 6h2v12H6zm3.5 6L18 18V6z"/>
</svg>

</button>

<button class="btn big" id="playBtn">

<div class="loader" id="loader"></div>

<svg id="playIcon" viewBox="0 0 24 24">
<polygon points="5 3 19 12 5 21 5 3"></polygon>
</svg>

</button>

<button class="btn small" id="nextBtn">

<svg viewBox="0 0 24 24">
<path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/>
</svg>

</button>

</div>

<input type="range" class="volume" id="volume" min="0" max="1" step="0.01" value="0.8">

</div>

<h2 class="title">🔥 Destaques</h2>

<div class="list" id="featured"></div>

</section>

<section class="section" id="radios">

<div class="search">
<input type="text" placeholder="Buscar rádio..." id="searchRadio">
</div>

<h2 class="title">💖 Love Songs</h2>
<div class="list" id="loveList"></div>

<h2 class="title">📻 Flashback 90s</h2>
<div class="list" id="flashList"></div>

<h2 class="title">🎵 Hits & Pop</h2>
<div class="list" id="hitsList"></div>

<h2 class="title">🤠 Sertanejo</h2>
<div class="list" id="sertanejoList"></div>

<h2 class="title">🌎 Web Rádios</h2>
<div class="list" id="webList"></div>

</section>

<section class="section" id="tv">

<div class="tv-player">

<video id="tvVideo" controls playsinline webkit-playsinline></video>

<button class="fullscreen" id="fullscreenBtn">
⛶
</button>

</div>

<div class="search">
<input type="text" placeholder="Buscar canal..." id="searchTv">
</div>

<div class="list" id="tvList"></div>

</section>

<section class="section" id="themes">

<h2 class="title">🎨 Temas</h2>

<div class="theme-grid">

<div class="theme" style="background:linear-gradient(135deg,#141e30,#243b55)" onclick="theme('#d4af37','#090b14')"></div>

<div class="theme" style="background:linear-gradient(135deg,#1d2671,#c33764)" onclick="theme('#ff4d8d','#090b14')"></div>

<div class="theme" style="background:linear-gradient(135deg,#0f2027,#2c5364)" onclick="theme('#00d4ff','#08131b')"></div>

<div class="theme" style="background:linear-gradient(135deg,#134e5e,#71b280)" onclick="theme('#00ff88','#071411')"></div>

<div class="theme" style="background:linear-gradient(135deg,#42275a,#734b6d)" onclick="theme('#ff66cc','#120a16')"></div>

<div class="theme" style="background:linear-gradient(135deg,#000,#434343)" onclick="theme('#fff','#000')"></div>

</div>

</section>

</div>

<nav class="nav">

<button class="active" data-tab="home">
<svg viewBox="0 0 24 24">
<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H7v8H5a2 2 0 0 1-2-2z"/>
</svg>
Home
</button>

<button data-tab="radios">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="2"/>
<path d="M16.24 7.76a6 6 0 0 1 0 8.48"/>
<path d="M7.76 7.76a6 6 0 0 0 0 8.48"/>
</svg>
Rádios
</button>

<button data-tab="tv">
<svg viewBox="0 0 24 24">
<rect x="2" y="7" width="20" height="15" rx="2"/>
</svg>
TV
</button>

<button data-tab="themes">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
</svg>
Temas
</button>

</nav>

<audio id="audio"></audio>

<script>

const radios=[

{
name:"🎧 NALDOA PLAY",
genre:"Premium Hits",
url:"https://stream.zeno.fm/xx785t45mf9uv",
logo:"logo1.jpg"
},

{
name:"💖 Love Songs",
genre:"Românticas",
url:"https://stream.zeno.fm/n4gzbe9ufzzuv",
logo:"logo.jpg"
},

{
name:"📻 Flashback 90s",
genre:"Anos 90",
url:"https://stream.zeno.fm/8z1qzw1xg8quv",
logo:"logo.jpg"
},

{
name:"🎵 Pop Hits",
genre:"Pop Internacional",
url:"https://stream.zeno.fm/f3a1wq1sm0quv",
logo:"logo.jpg"
},

{
name:"🤠 Sertanejo Hits",
genre:"Sertanejo",
url:"https://stream.zeno.fm/qvvv5f9ufzzuv",
logo:"logo.jpg"
},

{
name:"🌎 Web Rádio Mix",
genre:"Eclética",
url:"https://stream.zeno.fm/c8p9h6rufzzuv",
logo:"logo.jpg"
},

{
name:"🔥 Dance Hits",
genre:"Dance",
url:"https://stream.zeno.fm/0r0xa792kwzuv",
logo:"logo.jpg"
}

];

let channels=[];

const audio=document.getElementById('audio');

const playBtn=document.getElementById('playBtn');

const playIcon=document.getElementById('playIcon');

const loader=document.getElementById('loader');

const player=document.getElementById('player');

let current=0;

let playing=false;

function playRadio(index){

current=index;

const r=radios[index];

document.getElementById('radioName').innerText=r.name;
document.getElementById('radioGenre').innerText=r.genre;
document.getElementById('radioLogo').src=r.logo;

audio.src=r.url;

loader.style.display='block';
playIcon.style.display='none';

player.classList.add('loading');

audio.play()

.then(()=>{

playing=true;

loader.style.display='none';
playIcon.style.display='block';

playIcon.innerHTML=`
<rect x="6" y="4" width="4" height="16"></rect>
<rect x="14" y="4" width="4" height="16"></rect>
`;

player.classList.remove('loading');
player.classList.add('playing');

})

.catch(()=>{

loader.style.display='none';
playIcon.style.display='block';

playIcon.innerHTML=`
<polygon points="5 3 19 12 5 21 5 3"></polygon>
`;

player.classList.remove('loading');

});

}

function togglePlay(){

if(playing){

audio.pause();

playing=false;

playIcon.innerHTML=`
<polygon points="5 3 19 12 5 21 5 3"></polygon>
`;

}else{

playRadio(current);

}

}

playBtn.onclick=togglePlay;

document.getElementById('nextBtn').onclick=()=>{

current++;

if(current>=radios.length){
current=0;
}

playRadio(current);

};

document.getElementById('prevBtn').onclick=()=>{

current--;

if(current<0){
current=radios.length-1;
}

playRadio(current);

};

document.getElementById('volume').oninput=(e)=>{
audio.volume=e.target.value;
};

function renderRadios(){

const featured=document.getElementById('featured');

featured.innerHTML='';

radios.forEach((r,i)=>{

const html=`

<div class="card" onclick="playRadio(${i})">

<img src="${r.logo}">

<div>
<h3>${r.name}</h3>
<span>${r.genre}</span>
</div>

</div>

`;

featured.innerHTML+=html;

});

document.getElementById('loveList').innerHTML=featured.innerHTML;
document.getElementById('flashList').innerHTML=featured.innerHTML;
document.getElementById('hitsList').innerHTML=featured.innerHTML;
document.getElementById('sertanejoList').innerHTML=featured.innerHTML;
document.getElementById('webList').innerHTML=featured.innerHTML;

}

async function loadTV(){

const tv=document.getElementById('tvList');

tv.innerHTML=`
<div style="padding:30px;text-align:center;opacity:.7;">
📡 Carregando IPTV Brasil...
</div>
`;

try{

const res=await fetch('https://iptv-org.github.io/iptv/countries/br.m3u');

const text=await res.text();

const lines=text.split('\n');

let currentName='';

channels=[];

for(let line of lines){

line=line.trim();

if(line.startsWith('#EXTINF')){

const match=line.match(/,(.*)$/);

if(match){
currentName=match[1];
}

}else if(line.startsWith('http')){

channels.push({
name:currentName,
url:line
});

}

}

tv.innerHTML='';

channels.slice(0,120).forEach(c=>{

tv.innerHTML+=`

<div class="card" onclick="playTV('${c.url}')">

<img src="logo.jpg">

<div>
<h3>${c.name}</h3>
<span>Canal IPTV Brasil</span>
</div>

</div>

`;

});

}catch(e){

tv.innerHTML=`
<div style="padding:30px;text-align:center;color:#ff7777;">
⚠️ Erro ao carregar IPTV
</div>
`;

}

}

function playTV(url){

const video=document.getElementById('tvVideo');

video.src=url;

video.load();

video.play().catch(()=>{});

}

document.getElementById('fullscreenBtn').onclick=()=>{

const video=document.getElementById('tvVideo');

if(video.requestFullscreen){

video.requestFullscreen();

}else if(video.webkitEnterFullscreen){

video.webkitEnterFullscreen();

}else if(video.webkitRequestFullscreen){

video.webkitRequestFullscreen();

}

};

document.querySelectorAll('.nav button').forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));

document.getElementById(btn.dataset.tab).classList.add('active');

};

});

function theme(color,bg){

document.documentElement.style.setProperty('--primary',color);

document.documentElement.style.setProperty('--bg',bg);

}

const bars=document.querySelectorAll('.bar');

setInterval(()=>{

bars.forEach(bar=>{

bar.style.height=Math.random()*45+8+'px';

});

},140);

renderRadios();

loadTV();

</script>

</body>
</html>
