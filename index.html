<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<title>NALDOA PLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{
--primary:#d4af37;
--bg:#080b14;
--card:#111827ee;
--text:#fff;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

.gradient-bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#18233b 0%,#080b14 60%);
z-index:-3;
transition:1s;
}

.stars{
position:fixed;
inset:0;
overflow:hidden;
z-index:-2;
pointer-events:none;
}

.star{
position:absolute;
background:#fff;
border-radius:50%;
opacity:.5;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.1}
50%{opacity:.8}
}

.header{
position:sticky;
top:0;
z-index:999;
backdrop-filter:blur(20px);
background:#080b14dd;
border-bottom:1px solid rgba(255,255,255,.06);
padding:14px 18px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo-wrap{
display:flex;
align-items:center;
gap:12px;
}

.logo-wrap img{
width:46px;
height:46px;
border-radius:14px;
object-fit:cover;
border:2px solid var(--primary);
}

.logo-title h1{
font-size:1rem;
font-weight:800;
letter-spacing:1px;
}

.logo-title span{
font-size:.72rem;
opacity:.6;
}

.live-pill{
padding:8px 14px;
border-radius:999px;
background:rgba(212,175,55,.12);
display:flex;
align-items:center;
gap:8px;
font-size:.75rem;
}

.dot{
width:8px;
height:8px;
background:var(--primary);
border-radius:50%;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(.5)}
100%{transform:scale(1)}
}

.container{
padding:18px 18px 110px;
max-width:900px;
margin:auto;
}

.section{
display:none;
animation:fade .3s;
}

.section.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:none}
}

/* PLAYER */

.hero-player{
background:linear-gradient(180deg,#131c2f,#0b101c);
border-radius:34px;
padding:24px 20px;
border:1px solid rgba(255,255,255,.06);
box-shadow:0 0 40px rgba(0,0,0,.4);
overflow:hidden;
position:relative;
}

.hero-player::before{
content:'';
position:absolute;
width:220px;
height:220px;
background:rgba(212,175,55,.09);
border-radius:50%;
top:-120px;
right:-90px;
filter:blur(20px);
}

.main-radio-logo{
width:220px;
height:220px;
border-radius:50%;
margin:auto;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.rotating-ring{
position:absolute;
inset:0;
border-radius:50%;
border:4px solid rgba(255,255,255,.08);
border-top:4px solid var(--primary);
animation:spin 1s linear infinite;
}

.main-radio-logo img{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:4px solid var(--primary);
background:#111;
z-index:2;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

.radio-title{
margin-top:20px;
text-align:center;
}

.radio-title h2{
font-size:1.4rem;
font-weight:800;
}

.radio-title p{
margin-top:6px;
opacity:.7;
font-size:.85rem;
}

.controls{
margin-top:24px;
display:flex;
align-items:center;
justify-content:center;
gap:18px;
}

.ctrl-btn{
width:58px;
height:58px;
border:none;
border-radius:50%;
background:#1b2337;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.ctrl-btn svg{
width:24px;
height:24px;
fill:white;
}

.play-btn{
width:84px;
height:84px;
background:linear-gradient(135deg,var(--primary),#a98418);
box-shadow:0 0 30px rgba(212,175,55,.5);
}

.visualizer{
margin-top:28px;
display:flex;
justify-content:center;
align-items:flex-end;
gap:6px;
height:52px;
}

.bar{
width:6px;
height:15px;
border-radius:20px;
background:linear-gradient(to top,var(--primary),white);
transition:.1s;
}

.volume{
margin-top:22px;
width:100%;
accent-color:var(--primary);
}

.section-title{
margin:22px 0 16px;
font-size:1rem;
font-weight:800;
color:var(--primary);
}

.search{
display:flex;
align-items:center;
gap:10px;
background:var(--card);
padding:14px 16px;
border-radius:18px;
margin-bottom:18px;
}

.search input{
background:none;
border:none;
outline:none;
color:white;
width:100%;
font-size:.95rem;
}

.radios-grid,
.channels-grid{
display:grid;
grid-template-columns:1fr;
gap:14px;
}

.radio-card,
.channel-card{
background:var(--card);
border-radius:24px;
padding:14px;
display:flex;
align-items:center;
gap:14px;
cursor:pointer;
transition:.2s;
border:1px solid rgba(255,255,255,.05);
}

.radio-card:hover,
.channel-card:hover{
transform:scale(.98);
border-color:var(--primary);
}

.radio-card img,
.channel-card img{
width:62px;
height:62px;
border-radius:18px;
object-fit:cover;
background:#111;
}

.radio-info{
flex:1;
}

.radio-info h3{
font-size:.95rem;
margin-bottom:5px;
}

.radio-info span{
font-size:.75rem;
opacity:.6;
}

.tag{
padding:6px 10px;
border-radius:999px;
background:rgba(212,175,55,.12);
font-size:.68rem;
color:var(--primary);
font-weight:700;
}

.tv-player{
margin-bottom:20px;
background:black;
border-radius:24px;
overflow:hidden;
border:2px solid rgba(255,255,255,.06);
position:relative;
}

.tv-player video{
width:100%;
height:240px;
background:black;
}

.full-btn{
position:absolute;
bottom:12px;
right:12px;
width:46px;
height:46px;
border:none;
border-radius:50%;
background:#000000aa;
color:white;
cursor:pointer;
}

.themes{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
margin-top:18px;
}

.theme-card{
height:90px;
border-radius:24px;
cursor:pointer;
border:2px solid rgba(255,255,255,.1);
position:relative;
overflow:hidden;
}

.theme-card span{
position:absolute;
bottom:8px;
left:8px;
font-size:.8rem;
font-weight:700;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
padding:10px 12px 24px;
display:flex;
justify-content:space-around;
background:#080b14ee;
backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.06);
z-index:999;
}

.nav-btn{
border:none;
background:none;
color:#aaa;
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
font-size:.7rem;
cursor:pointer;
padding:8px 14px;
border-radius:18px;
}

.nav-btn svg{
width:22px;
height:22px;
stroke:currentColor;
fill:none;
}

.nav-btn.active{
background:rgba(212,175,55,.12);
color:var(--primary);
}

@media(min-width:700px){
.radios-grid,
.channels-grid{
grid-template-columns:repeat(2,1fr);
}
}
</style>
</head>

<body>

<div class="gradient-bg" id="gradientBg"></div>
<div class="stars" id="stars"></div>

<header class="header">

<div class="logo-wrap">
<img src="https://i.imgur.com/8Km9tLL.png">

<div class="logo-title">
<h1>NALDOA PLAY</h1>
<span>Rádio • Web Rádio • IPTV</span>
</div>
</div>

<div class="live-pill">
<div class="dot"></div>
<span id="nowPlayingTop">Ao vivo</span>
</div>

</header>

<div class="container">

<!-- HOME -->
<section class="section active" id="home">

<div class="hero-player">

<div class="main-radio-logo">
<div class="rotating-ring"></div>

<img id="mainLogo"
src="https://i.imgur.com/8Km9tLL.png">
</div>

<div class="radio-title">
<h2 id="currentName">NALDOA PLAY</h2>
<p id="currentDesc">Sua rádio premium 24h</p>
</div>

<div class="controls">

<button class="ctrl-btn" id="prevBtn">
<svg viewBox="0 0 24 24">
<path d="M6 6h2v12H6zm3.5 6L18 18V6z"/>
</svg>
</button>

<button class="ctrl-btn play-btn" id="playBtn">
<svg id="playIcon" viewBox="0 0 24 24">
<polygon points="5 3 19 12 5 21"/>
</svg>
</button>

<button class="ctrl-btn" id="nextBtn">
<svg viewBox="0 0 24 24">
<path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/>
</svg>
</button>

</div>

<div class="visualizer" id="visualizer"></div>

<input type="range" class="volume" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">

</div>

<div class="section-title">🔥 DESTAQUES</div>

<div class="radios-grid" id="featuredRadios"></div>

</section>

<!-- RADIOS -->
<section class="section" id="radios">

<div class="search">
<input type="text" placeholder="Buscar rádios..." id="searchRadio">
</div>

<div class="section-title">🎵 TODAS AS RÁDIOS</div>

<div class="radios-grid" id="radiosList"></div>

</section>

<!-- TV -->
<section class="section" id="tv">

<div class="tv-player">

<video id="tvVideo" controls playsinline webkit-playsinline></video>

<button class="full-btn" id="fullscreenBtn">⛶</button>

</div>

<div class="search">
<input type="text" placeholder="Buscar canais IPTV..." id="searchChannel">
</div>

<div class="channels-grid" id="channelsList"></div>

</section>

<!-- THEMES -->
<section class="section" id="themes">

<div class="section-title">🎨 TEMAS</div>

<div class="themes" id="themesGrid"></div>

</section>

</div>

<!-- NAV -->

<nav class="bottom-nav">

<button class="nav-btn active" data-tab="home">
<svg viewBox="0 0 24 24">
<path d="M3 10L12 3l9 7v10H3z"/>
</svg>
<span>Home</span>
</button>

<button class="nav-btn" data-tab="radios">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="2"/>
<path d="M16 8a6 6 0 010 8M8 8a6 6 0 000 8"/>
</svg>
<span>Rádios</span>
</button>

<button class="nav-btn" data-tab="tv">
<svg viewBox="0 0 24 24">
<rect x="2" y="6" width="20" height="14" rx="2"/>
</svg>
<span>TV</span>
</button>

<button class="nav-btn" data-tab="themes">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
</svg>
<span>Temas</span>
</button>

</nav>

<audio id="audio"></audio>

<script>

const audio = document.getElementById('audio');

const radios = [

{
name:"🎧 NALDOA PLAY",
desc:"Sua rádio oficial",
tag:"Premium",
logo:"https://i.imgur.com/8Km9tLL.png",
url:"https://stream.zeno.fm/xx785t45mf9uv"
},

{
name:"Love Songs",
desc:"Românticas internacionais",
tag:"Love",
logo:"https://cdn-icons-png.flaticon.com/512/833/833472.png",
url:"https://uk2.internet-radio.com/proxy/lovesongs?mp=/stream"
},

{
name:"Flashback 80s",
desc:"Hits anos 80",
tag:"80s",
logo:"https://cdn-icons-png.flaticon.com/512/3659/3659899.png",
url:"https://streaming.radionomy.com/JamendoLounge"
},

{
name:"Pop Hits",
desc:"Pop internacional",
tag:"Pop",
logo:"https://cdn-icons-png.flaticon.com/512/727/727245.png",
url:"https://stream.revma.ihrhls.com/zc1821"
},

{
name:"Sertanejo Hits",
desc:"Modão e universitário",
tag:"Sertanejo",
logo:"https://cdn-icons-png.flaticon.com/512/888/888879.png",
url:"https://playerservices.streamtheworld.com/api/livestream-redirect/CBN_BH.mp3"
},

{
name:"Rock Classics",
desc:"Rock 24h",
tag:"Rock",
logo:"https://cdn-icons-png.flaticon.com/512/3659/3659784.png",
url:"https://playerservices.streamtheworld.com/api/livestream-redirect/RADIO_89FM.mp3"
},

{
name:"Lofi Beats",
desc:"Relax e study",
tag:"Lo-fi",
logo:"https://cdn-icons-png.flaticon.com/512/3281/3281289.png",
url:"https://streams.ilovemusic.de/iloveradio17.mp3"
},

{
name:"Dance Eletrônica",
desc:"EDM e remix",
tag:"EDM",
logo:"https://cdn-icons-png.flaticon.com/512/2972/2972531.png",
url:"https://streaming.radio.co/s986435880/listen"
},

{
name:"Pagode & Samba",
desc:"Brasil vibes",
tag:"Pagode",
logo:"https://cdn-icons-png.flaticon.com/512/3659/3659804.png",
url:"https://stm1.srvif.com:6670/stream"
}

];

let current = 0;
let playing = false;

const barsWrap = document.getElementById('visualizer');

for(let i=0;i<24;i++){
const b=document.createElement('div');
b.className='bar';
barsWrap.appendChild(b);
}

const bars=document.querySelectorAll('.bar');

setInterval(()=>{
bars.forEach(bar=>{
bar.style.height=(playing?Math.random()*45+6:8)+'px';
});
},120);

function renderRadios(){

const radiosList=document.getElementById('radiosList');
const featured=document.getElementById('featuredRadios');

radiosList.innerHTML='';
featured.innerHTML='';

radios.forEach((radio,index)=>{

const html=`
<img src="${radio.logo}">
<div class="radio-info">
<h3>${radio.name}</h3>
<span>${radio.desc}</span>
</div>
<div class="tag">${radio.tag}</div>
`;

const card=document.createElement('div');
card.className='radio-card';
card.innerHTML=html;
card.onclick=()=>playRadio(index);

radiosList.appendChild(card);

if(index<4){
const card2=document.createElement('div');
card2.className='radio-card';
card2.innerHTML=html;
card2.onclick=()=>playRadio(index);
featured.appendChild(card2);
}

});

}

function playRadio(index){

current=index;

audio.src=radios[index].url;
audio.load();

document.getElementById('currentName').innerText=radios[index].name;
document.getElementById('currentDesc').innerText=radios[index].desc;
document.getElementById('nowPlayingTop').innerText=radios[index].name;
document.getElementById('mainLogo').src=radios[index].logo;

audio.play().then(()=>{

playing=true;

document.getElementById('playIcon').innerHTML=`
<rect x="6" y="4" width="4" height="16"></rect>
<rect x="14" y="4" width="4" height="16"></rect>
`;

}).catch(()=>{

playing=false;

});

}

document.getElementById('playBtn').onclick=()=>{

if(playing){

audio.pause();
playing=false;

document.getElementById('playIcon').innerHTML=`
<polygon points="5 3 19 12 5 21"></polygon>
`;

}else{

playRadio(current);

}

};

document.getElementById('prevBtn').onclick=()=>{

current--;
if(current<0) current=radios.length-1;
playRadio(current);

};

document.getElementById('nextBtn').onclick=()=>{

current++;
if(current>=radios.length) current=0;
playRadio(current);

};

document.getElementById('volumeSlider').oninput=e=>{
audio.volume=e.target.value;
};

document.getElementById('searchRadio').addEventListener('input',e=>{

const term=e.target.value.toLowerCase();

document.querySelectorAll('#radiosList .radio-card').forEach(card=>{

card.style.display=
card.innerText.toLowerCase().includes(term)
?'flex':'none';

});

});

/* IPTV */

let allChannels=[];

async function loadTV(){

const container=document.getElementById('channelsList');

container.innerHTML='<div style="padding:20px">📡 Carregando IPTV...</div>';

try{

const response=await fetch('https://iptv-org.github.io/iptv/countries/br.m3u');

const text=await response.text();

const lines=text.split('\n');

let name='';

lines.forEach(line=>{

if(line.startsWith('#EXTINF')){

name=line.split(',').pop();

}

else if(line.startsWith('http')){

allChannels.push({
name:name,
url:line
});

}

});

renderChannels(allChannels.slice(0,80));

}catch(e){

container.innerHTML='<div style="padding:20px">Erro IPTV</div>';

}

}

function renderChannels(list){

const container=document.getElementById('channelsList');

container.innerHTML='';

list.forEach(ch=>{

const card=document.createElement('div');

card.className='channel-card';

card.innerHTML=`
<img src="https://cdn-icons-png.flaticon.com/512/2504/2504947.png">
<div class="radio-info">
<h3>${ch.name}</h3>
<span>Canal IPTV Brasil</span>
</div>
`;

card.onclick=()=>{

const video=document.getElementById('tvVideo');

video.src=ch.url;

video.play().catch(()=>{});

};

container.appendChild(card);

});

}

document.getElementById('searchChannel').addEventListener('input',e=>{

const term=e.target.value.toLowerCase();

const filtered=allChannels.filter(c=>
c.name.toLowerCase().includes(term)
);

renderChannels(filtered);

});

document.getElementById('fullscreenBtn').onclick=()=>{

const video=document.getElementById('tvVideo');

if(video.requestFullscreen){
video.requestFullscreen();
}
else if(video.webkitEnterFullscreen){
video.webkitEnterFullscreen();
}

};

/* THEMES */

const themes=[

['Cosmic','radial-gradient(circle at top,#18233b,#080b14)'],
['Purple','linear-gradient(135deg,#2d0b52,#090014)'],
['Ocean','linear-gradient(135deg,#003973,#000428)'],
['Sunset','linear-gradient(135deg,#42275a,#734b6d)'],
['Fire','linear-gradient(135deg,#200122,#6f0000)'],
['Neon','linear-gradient(135deg,#0f2027,#2c5364)'],
['Pink','linear-gradient(135deg,#ff0080,#7928ca)'],
['Green','linear-gradient(135deg,#134e5e,#71b280)']

];

const themesGrid=document.getElementById('themesGrid');

themes.forEach(t=>{

const div=document.createElement('div');

div.className='theme-card';

div.style.background=t[1];

div.innerHTML=`<span>${t[0]}</span>`;

div.onclick=()=>{

document.getElementById('gradientBg').style.background=t[1];

};

themesGrid.appendChild(div);

});

/* NAV */

document.querySelectorAll('.nav-btn').forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));

document.getElementById(btn.dataset.tab).classList.add('active');

};

});

/* STARS */

const stars=document.getElementById('stars');

for(let i=0;i<120;i++){

const s=document.createElement('div');

s.className='star';

const size=Math.random()*3+1;

s.style.width=size+'px';
s.style.height=size+'px';
s.style.left=Math.random()*100+'%';
s.style.top=Math.random()*100+'%';
s.style.animationDelay=Math.random()*5+'s';

stars.appendChild(s);

}

renderRadios();
loadTV();

</script>

</body>
</html>
